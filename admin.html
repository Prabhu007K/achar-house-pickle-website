<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Admin — Achaar House</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="login-view">
    <div class="login-box">
      <h1>Pickle Shop Admin</h1>
      <p>Manage pickle catalog, stock, and orders.</p>
      <form id="login-form">
        <label>Password<input type="password" id="admin-password" required></label>
        <button type="submit" class="btn-primary" style="width:100%;padding:.65rem">Sign in</button>
      </form>
      <p class="login-hint">Demo password: <code>achar2026</code></p>
      <p class="login-hint" style="margin-top:.5rem"><a href="index.html">← Back to shop</a></p>
    </div>
  </div>

  <div id="admin-view" class="hidden">
    <header class="admin-header">
      <div><h1>Achaar House — Admin</h1><p>Product & inventory management</p></div>
      <div class="admin-nav">
        <a href="index.html" class="btn-outline">View shop</a>
        <button type="button" class="btn-outline" id="logout-btn">Log out</button>
      </div>
    </header>

    <main class="admin-wrap">
      <div class="stats">
        <div class="stat"><span class="stat-val" id="stat-products">0</span><span class="stat-lbl">Pickles</span></div>
        <div class="stat"><span class="stat-val" id="stat-low">0</span><span class="stat-lbl">Low stock</span></div>
        <div class="stat"><span class="stat-val" id="stat-orders">0</span><span class="stat-lbl">Orders</span></div>
      </div>

      <section class="admin-card">
        <h2 id="form-title">Add pickle</h2>
        <form id="product-form" novalidate>
          <input type="hidden" id="product-id">
          <div class="form-grid">
            <label>Name<input id="p-name" required></label>
            <label>Emoji<input id="p-emoji" maxlength="4" placeholder="🥭"></label>
            <label>Stock (jars)<input type="number" id="p-stock" min="0" required></label>
            <label>250g price (₹)<input type="number" id="p-s0" min="1" required></label>
            <label>500g price (₹)<input type="number" id="p-s1" min="1" required></label>
            <label>1kg price (₹)<input type="number" id="p-s2" min="1" required></label>
            <label>Visible<select id="p-active"><option value="true">Yes</option><option value="false">Hidden</option></select></label>
          </div>
          <label style="display:block;font-size:.82rem;font-weight:500;margin-bottom:.75rem">
            Product image URL
            <input id="p-image-url" placeholder="https://… or upload below" style="width:100%;margin-top:.35rem;padding:.55rem;border:1px solid #e2e8f0;border-radius:8px;font:inherit">
          </label>
          <label style="display:block;font-size:.82rem;font-weight:500;margin-bottom:.75rem">
            Or upload image
            <input type="file" id="p-image-file" accept="image/*" style="margin-top:.35rem;font:inherit">
            <small style="color:#64748b;display:block;margin-top:.25rem">Shows emoji if no image or if image fails to load.</small>
          </label>
          <div id="image-preview-wrap" class="hidden" style="margin-bottom:1rem">
            <img id="image-preview" alt="Preview" style="max-width:120px;max-height:120px;border-radius:8px;border:1px solid #e2e8f0">
          </div>
          <label style="display:block;font-size:.82rem;font-weight:500;margin-bottom:1rem">Description<textarea id="p-desc" rows="2" style="width:100%;margin-top:.35rem;padding:.55rem;border:1px solid #e2e8f0;border-radius:8px;font:inherit"></textarea></label>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="save-product-btn">Save</button>
            <button type="button" class="btn-outline hidden" id="cancel-edit">Cancel</button>
          </div>
          <p id="form-status" class="form-status hidden"></p>
        </form>
      </section>

      <section class="admin-card">
        <h2>Inventory</h2>
        <div class="table-wrap"><table><thead><tr><th>Pickle</th><th>Prices</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody id="products-table"></tbody></table></div>
      </section>

      <section class="admin-card">
        <h2>Orders</h2>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Customer</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody id="orders-table"></tbody></table></div>
      </section>
    </main>
  </div>
  <script src="js/store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
